<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>澔澔遊戲大世界 🌈 (HaoHao Game World)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Animation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Noto+Sans+TC:wght@900&display=swap');
        
        body, html {
            margin: 0; padding: 0;
            width: 100vw; min-height: 100vh;
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background: #0f172a;
            color: white;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Animated Nebula Background */
        .nebula {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(76, 29, 149, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(30, 58, 138, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(13, 148, 136, 0.2) 0%, transparent 60%);
            z-index: -1;
            filter: blur(60px);
            animation: drift 20s ease-in-out infinite;
        }

        @keyframes drift {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) translate(2%, 2%); }
        }

        /* Glassmorphism Card */
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(45, 212, 191, 0.2);
        }

        .game-card:active {
            transform: scale(0.98);
        }

        .play-btn {
            background: linear-gradient(135deg, #2dd4bf 0%, #0d9488 100%);
            box-shadow: 0 4px 15px rgba(13, 148, 136, 0.4);
        }

        /* A-Bu Welcome Area */
        .abu-welcome {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            margin-bottom: 2rem;
        }

        .chat-bubble {
            background: white;
            border-radius: 24px;
            padding: 16px 24px;
            font-size: 1.25rem;
            font-weight: 900;
            color: #1e293b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            position: relative;
        }
        .chat-bubble::after {
            content: ''; position: absolute; left: -14px; top: 50%;
            transform: translateY(-50%);
            border-width: 12px 14px 12px 0; border-style: solid; border-color: transparent white transparent transparent;
        }

        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .float-anim { animation: floating 4s ease-in-out infinite; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 4rem 1.5rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="safe-area-pt">

    <div class="nebula"></div>

    <header class="pt-12 pb-8 px-6 text-center">
        <h1 class="text-5xl sm:text-7xl font-black italic tracking-tighter mb-4 drop-shadow-2xl">
            澔澔遊戲大世界 <span class="bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-blue-500">🌈</span>
        </h1>
        <p class="text-teal-200 text-lg sm:text-xl font-bold opacity-80 uppercase tracking-[0.3em]">HaoHao Game Collection</p>
    </header>

    <main>
        <div class="max-w-4xl mx-auto abu-welcome">
            <div id="abu-host" class="float-anim cursor-pointer" onclick="pokeAbu()">
                <svg width="100" height="100" viewBox="0 0 100 100" class="drop-shadow-xl">
                    <circle cx="50" cy="50" r="45" fill="#333" />
                    <!-- Crown/Hat -->
                    <path d="M 30 25 L 50 10 L 70 25 Z" fill="#fbbf24" />
                    <circle cx="35" cy="45" r="7" fill="white" /><circle cx="36" cy="45" r="3" fill="black" />
                    <circle cx="65" cy="45" r="7" fill="white" /><circle cx="64" cy="45" r="3" fill="black" />
                    <path d="M 45 55 L 55 55 L 50 65 Z" fill="#fbbf24" />
                    <rect x="25" y="75" width="50" height="15" fill="#2dd4bf" rx="4" />
                </svg>
            </div>
            <div class="chat-bubble" id="abu-dialog">
                澔澔，歡迎回來！今天想去哪裡冒險呢？🚀
            </div>
        </div>

        <div class="game-grid" id="game-grid">
            <!-- Game cards will be injected here -->
        </div>
    </main>

    <footer class="text-center pb-12 opacity-50 text-sm font-bold tracking-widest">
        MADE WITH ❤️ FOR HAOHAO BY AGENT ABU
    </footer>

    <script>
        const games = [
            {
                id: '100',
                title: '星際數字探險',
                desc: '在閃爍的星空中，尋找神秘的能量數字！🚀',
                icon: '🌌',
                path: './100.html',
                color: 'from-blue-500 to-indigo-600'
            },
            {
                id: 'balance',
                title: '平衡吧！阿布',
                desc: 'Matter.js 物理挑戰！幫阿布在空中抓星星。⭐',
                icon: '⚖️',
                path: './balance.html',
                color: 'from-teal-400 to-emerald-500'
            },
            {
                id: 'logic',
                title: '阿布 3D 魔術方塊',
                desc: '進階空間挑戰！在 3D 世界蓋出神奇形狀。🧱',
                icon: '🧊',
                path: './logic.html',
                color: 'from-purple-500 to-pink-600'
            },
            {
                id: 'math',
                title: '阿布超市小星探',
                desc: '推著推車去數數！真實物理購物的趣味體驗。🍎',
                icon: '🛒',
                path: './math.html',
                color: 'from-orange-400 to-red-500'
            },
            {
                id: 'shoot',
                title: '阿布太空巡邏隊',
                desc: '拉動重力彈弓！向宇宙發射能量星，收集祕寶。🎯',
                icon: '🛸',
                path: './shoot.html',
                color: 'from-cyan-400 to-blue-500'
            },
            {
                id: 'time',
                title: '阿布時光探險家',
                desc: '啟動 3D 時光機！跨越恐龍時代與未來城市。⏳',
                icon: '💎',
                path: './time.html',
                color: 'from-yellow-400 to-amber-600'
            }
        ];

        function renderGames() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = games.map((game, index) => `
                <div class="game-card flex flex-col p-8 group" onclick="gsap.to(this, {scale: 0.95, duration: 0.1, onComplete: () => window.location.href='${game.path}'})">
                    <div class="text-6xl mb-6 group-hover:scale-110 transition-transform duration-300 w-fit">${game.icon}</div>
                    <div class="flex-grow">
                        <h2 class="text-3xl font-black mb-3 text-white tracking-tighter">${game.title}</h2>
                        <p class="text-teal-100 opacity-60 text-lg leading-relaxed font-bold">${game.desc}</p>
                    </div>
                    <div class="mt-8">
                        <div class="play-btn w-full py-4 rounded-2xl text-center text-xl font-black tracking-widest uppercase transition-all">
                            立即冒險 ⚡
                        </div>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-br ${game.color} opacity-0 group-hover:opacity-5 transition-opacity pointer-events-none"></div>
                </div>
            `).join('');
            
            // Stagger animation
            gsap.from(".game-card", {
                y: 50,
                opacity: 0,
                duration: 0.8,
                stagger: 0.15,
                ease: "power3.out"
            });
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 1.3;
            window.speechSynthesis.speak(msg);
            document.getElementById('abu-dialog').innerText = text;
        }

        function pokeAbu() {
            const quotes = [
                "澔澔，今天想去哪裡冒險呢？🚀",
                "我也好想玩玩看那個時光機喔！🌌",
                "超市的水果看起來很好吃耶！🍎",
                "澔澔，你是全宇宙最聰明的神射手！🎯",
                "嘿嘿，別戳我，快出發吧！💨"
            ];
            speak(quotes[Math.floor(Math.random() * quotes.length)]);
            gsap.to("#abu-host", { scale: 1.2, duration: 0.2, yoyo: true, repeat: 1 });
        }

        // Initialize
        window.onload = () => {
            renderGames();
            setTimeout(() => {
                speak("澔澔，歡迎來到澔澔遊戲大世界！今天想去哪裡冒險呢？");
            }, 1000);
        }

    </script>
</body>
</html>
