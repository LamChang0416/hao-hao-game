<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>澔澔的行動數字派對：點點阿布！</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@700;900&display=swap');
        
        /* 基本手機設定：禁止滑動與選取 */
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            touch-action: manipulation; 
            overflow: hidden; 
            background-color: #f7fee7; 
            user-select: none;
            -webkit-touch-callout: none;
            overscroll-behavior: none;
        }

        /* 按鈕 Fat Fingers 優化 */
        .num-card { transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .num-card:active { transform: scale(0.9) translateY(4px); shadow: none; }
        .correct { background-color: #a3e635 !important; color: #365314; transform: scale(0.8); opacity: 0.4; pointer-events: none; }
        .next-hint { animation: pulseHint 1.2s infinite; border: 4px solid #f87171 !important; box-shadow: 0 0 25px rgba(248, 113, 113, 0.8); z-index: 20; transform: scale(1.05); }
        @keyframes pulseHint { 0% { transform: scale(1.05); } 50% { transform: scale(1.1); } 100% { transform: scale(1.05); } }

        /* 對話框氣泡 */
        .bubble { position: relative; background: #ffffff; border-radius: 20px; padding: 12px 20px; border: 3px solid #bef264; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .bubble:after { content: ''; position: absolute; bottom: -12px; left: 20px; border-width: 12px 12px 0; border-style: solid; border-color: #ffffff transparent; display: block; width: 0; }
        .bubble:before { content: ''; position: absolute; bottom: -16px; left: 18px; border-width: 14px 14px 0; border-style: solid; border-color: #bef264 transparent; display: block; width: 0; z-index: -1; }

        /* 阿布交互動畫 */
        #abu { transition: transform 0.2s ease, filter 0.2s; cursor: pointer; }
        .abu-tap-shock { animation: abuShock 0.3s ease-out; filter: hue-rotate(180deg) brightness(1.5); }
        @keyframes abuShock { 0% { transform: scale(1); } 30% { transform: scale(1.4) rotate(15deg); } 100% { transform: scale(1); } }
        .abu-happy { animation: abuDance 0.5s ease; }
        @keyframes abuDance { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-20px); } 75% { transform: translateY(-20px); } }

        /* 搞笑小動畫（手機優化） */
        .reward-abu { width: 120px; height: 120px; }
        .anim-reward { animation: rewardPop 2s ease-in-out forwards; }
        @keyframes rewardPop { 0% { transform: scale(0.5) translateY(100px); } 100% { transform: scale(1) translateY(0); } }

    </style>
</head>
<body class="min-h-screen flex flex-col p-2 safe-area-inset-bottom safe-area-inset-top">

    <div id="start-screen" class="fixed inset-0 bg-lime-600 flex flex-col items-center justify-center z-50 text-white p-6 text-center">
        <svg id="start-abu" width="100" height="100" viewBox="0 0 100 100" class="mb-8 animate-pulse">
            <circle cx="50" cy="50" r="45" fill="#333" />
            <circle cx="50" cy="40" r="25" fill="#444" />
            <circle cx="40" cy="35" r="5" fill="white" /> <circle cx="40" cy="35" r="2" fill="black" />
            <circle cx="60" cy="35" r="5" fill="white" /> <circle cx="60" cy="35" r="2" fill="black" />
            <polygon points="45,45 55,45 50,60" fill="#fbb03b" />
        </svg>
        <h1 class="text-4xl sm:text-5xl font-extrabold mb-4 tracking-wider leading-tight">澔澔，<br>阿布在等你點他！</h1>
        <p class="text-xl mb-12 opacity-80">跟阿布一起完成 1-100 的超級任務！</p>
        <button onclick="startGame()" class="bg-yellow-400 text-lime-900 text-3xl sm:text-4xl font-black py-7 px-14 rounded-full shadow-[0_12px_0_0_#ca8a04] active:shadow-none active:translate-y-[12px] transition-all">
            準備好了，開始！🚀
        </button>
    </div>

    <div id="game-ui" class="hidden flex-grow flex flex-col items-center gap-2">
        
        <div class="w-full max-w-lg bg-white rounded-3xl p-4 shadow-lg border border-lime-100 flex flex-row items-center gap-3">
            <div id="abu-container" class="relative">
                <svg id="abu" width="70" height="70" viewBox="0 0 100 100" onclick="handleAbuTap()">
                    <circle cx="50" cy="50" r="45" fill="#333" />
                    <circle cx="50" cy="40" r="25" fill="#444" />
                    <circle cx="40" cy="35" r="5" fill="white" /> <circle cx="40" cy="35" r="2" fill="black" />
                    <circle cx="60" cy="35" r="5" fill="white" /> <circle cx="60" cy="35" r="2" fill="black" />
                    <polygon points="45,45 55,45 50,60" fill="#fbb03b" />
                    <ellipse cx="20" cy="60" rx="10" ry="20" fill="#222" transform="rotate(-20 20 60)"/>
                    <ellipse cx="80" cy="60" rx="10" ry="20" fill="#222" transform="rotate(20 80 60)"/>
                </svg>
                <div class="absolute -top-3 -right-3 bg-red-500 text-white text-[10px] px-2 py-1 rounded-full animate-bounce">點我互動!</div>
            </div>
            <div class="flex-grow">
                <div id="abu-bubble" class="bubble text-base sm:text-xl font-extrabold text-gray-800 leading-snug">
                    找出下一個數字！
                </div>
            </div>
        </div>

        <div class="w-full max-w-lg bg-white rounded-full p-1 shadow-md border border-lime-50">
            <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                <div id="progress-bar" class="bg-lime-500 h-4 rounded-full transition-all" style="width: 0%"></div>
            </div>
        </div>

        <div class="flex-grow w-full max-w-xl flex justify-center items-center">
            <div id="game-board" class="w-full grid grid-cols-2 sm:grid-cols-5 gap-3 p-3 rounded-3xl min-h-[300px]">
                </div>
        </div>
        
        <div class="w-full max-w-lg bg-white p-3 rounded-2xl shadow-inner border border-lime-100 flex justify-center items-center gap-3">
            <div class="text-xs text-gray-500">已學會</div>
            <div class="text-5xl font-black text-lime-600"><span id="overall-progress">0</span><span class="text-lg text-gray-400">/100</span></div>
        </div>
    </div>

    <div id="reward-screen" class="hidden fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-40 text-white p-6 text-center">
        <h2 id="reward-title" class="text-3xl sm:text-5xl font-black mb-8 text-yellow-300 drop-shadow-md"></h2>
        
        <svg id="reward-abu" class="reward-abu anim-reward" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="#333" />
            <circle cx="50" cy="40" r="25" fill="#444" />
            <circle cx="40" cy="35" r="5" fill="white" /> <circle cx="40" cy="35" r="2" fill="black" />
            <circle cx="60" cy="35" r="5" fill="white" /> <circle cx="60" cy="35" r="2" fill="black" />
            <polygon points="45,45 55,45 50,60" fill="#fbb03b" />
            <ellipse cx="20" cy="60" rx="10" ry="20" fill="#222" transform="rotate(-20 20 60)"/>
            <ellipse cx="80" cy="60" rx="10" ry="20" fill="#222" transform="rotate(20 80 60)"/>
        </svg>
        
        <button onclick="nextLevel()" id="next-btn" class="hidden mt-14 bg-yellow-400 text-lime-950 text-2xl font-black py-4 px-12 rounded-full shadow-lg border-4 border-white animate-pulse">
            阿布我要繼續！
        </button>
    </div>

    <script>
        let currentTarget = 1;
        
        // 語音反饋庫
        const positiveSpeech = ["太神啦！", "澔澔好聰明！", "對啦，一百分！", "阿布為你拍手！"];
        const abuTapSpeech = ["別點啦，我頭暈！", "再點我就變色啦！", "哇塞，手勁真大！", "哎呀，不要欺負阿布！", "我是天才阿布，不是玩具！"];
        const abuTapAnims = ["🫨", "🤩", "🤪", "😵", "🤫"]; // 搞笑表情符號

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); // 解鎖語音
            renderBoard();
            setTimeout(() => speak(`找出第一個數字，1！`), 300);
        }

        function speak(text) {
            window.speechSynthesis.cancel(); 
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 1.3;
            window.speechSynthesis.speak(msg);
        }

        // --- 阿布直接互動核心邏輯 ---
        function handleAbuTap() {
            const abu = document.getElementById('abu');
            const bubble = document.getElementById('abu-bubble');
            
            // 隨機選擇搞笑語音與特效
            const randomIdx = Math.floor(Math.random() * abuTapSpeech.length);
            const speechText = abuTapSpeech[randomIdx];
            const animEmoji = abuTapAnims[Math.floor(Math.random() * abuTapAnims.length)];

            // 阿布「被電到」動畫
            abu.classList.add('abu-tap-shock');
            setTimeout(() => abu.classList.remove('abu-tap-shock'), 300);

            // 更新對話框，顯示搞笑文字與 Emoji
            bubble.innerHTML = `${speechText}<br>${animEmoji}`;
            speak(speechText);
        }
        // ---------------------------

        function renderBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            
            // 每 10 個數字一組
            let startNum = Math.floor((currentTarget - 1) / 10) * 10 + 1;
            let levelNums = [];
            for (let i = startNum; i < startNum + 10 && i <= 100; i++) {
                levelNums.push(i);
            }
            levelNums.sort(() => Math.random() - 0.5); // 隨機排序

            levelNums.forEach(num => {
                const btn = document.createElement('button');
                btn.innerText = num;
                btn.id = `num-${num}`;
                // 加大手機版按鈕（2列），平板版恢復（5列）
                btn.className = "num-card bg-white text-5xl sm:text-6xl font-black py-7 sm:py-9 rounded-2xl shadow-[0_8px_0_0_#d1d5db] border-2 border-gray-100 flex items-center justify-center";
                btn.onclick = () => handleTap(num, btn);
                board.appendChild(btn);
            });
            
            updateDisplay();
        }

        function handleTap(num, btn) {
            if (num === currentTarget) {
                // 正確
                speak(num.toString());
                btn.classList.add('correct');
                btn.style.boxShadow = "none";
                
                // 阿布開心的互動
                document.getElementById('abu').classList.add('abu-happy');
                setTimeout(() => document.getElementById('abu').classList.remove('abu-happy'), 500);

                currentTarget++;
                
                // 檢查是否達關卡獎勵
                if ((currentTarget - 1) % 10 === 0 || currentTarget > 100) {
                    setTimeout(showReward, 400); 
                } else {
                    let randomMsg = positiveSpeech[Math.floor(Math.random() * positiveSpeech.length)];
                    document.getElementById('abu-bubble').innerHTML = `${randomMsg}<br>找出數字： <span class="text-3xl text-red-500">${currentTarget}</span>`;
                    updateDisplay();
                }
            } else {
                // 錯誤
                btn.classList.add('bg-red-100');
                speak("再找找");
                setTimeout(() => btn.classList.remove('bg-red-100'), 250);
            }
        }

        function updateDisplay() {
            const progress = currentTarget - 1;
            document.getElementById('overall-progress').innerText = progress;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            
            // 提示下一個
            document.querySelectorAll('.num-card').forEach(b => b.classList.remove('next-hint'));
            const nextBtn = document.getElementById(`num-${currentTarget}`);
            if (nextBtn) {
                nextBtn.classList.add('next-hint');
                nextBtn.style.boxShadow = "none"; // 閃爍更明顯
            }
        }

        // 搞笑小動畫（手機優化：加大角色）
        function showReward() {
            const level = currentTarget - 1;
            const rewardScreen = document.getElementById('reward-screen');
            const rewardTitle = document.getElementById('reward-title');
            const rewardAbu = document.getElementById('reward-abu');
            const nextBtn = document.getElementById('next-btn');

            let msg = `澔澔太神啦！<br>學會到 ${level} 了！🫵`;
            if (level === 100) msg = `澔澔是宇宙最強！🏆<br>完成 100 分任務！`;
            rewardTitle.innerHTML = msg;
            
            speak(msg.replace('<br>', ''));
            rewardScreen.classList.remove('hidden');
            nextBtn.classList.add('hidden');
            
            // 彈出Confetti特效
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });

            // 隨機播放一個小動畫
            const abuAnims = ['abu-happy', 'abu-tap-shock'];
            rewardAbu.classList.add(abuAnims[Math.floor(Math.random()*abuAnims.length)]);

            setTimeout(() => {
                nextBtn.classList.remove('hidden');
                if(level === 100) nextBtn.innerText = "和阿布再玩一次！🚀";
            }, 1800);
        }

        function nextLevel() {
            document.getElementById('reward-screen').classList.add('hidden');
            document.getElementById('abu-bubble').innerHTML = `我們繼續吧！<br>找出下一個數字 <span class="text-3xl text-red-500">${currentTarget}</span>`;
            if (currentTarget > 100) { currentTarget = 1; document.getElementById('progress-bar').style.width='0%'; renderBoard(); startGame(); }
            else { renderBoard(); }
        }
    </script>
</body>
</html>
