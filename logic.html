<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>阿布 3D 魔術方塊 🚀 (終極觸控版)</title>
    
    <!-- Tailwind CSS for UI overlay -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js Math & Rendering Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Confetti & Animations -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- GSAP for Smooth Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+TC:wght@700;900&display=swap');
        
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bfdbfe 100%);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1; /* Underneath the UI */
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; /* Let touches pass through to 3D canvas */
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(30, 58, 138, 0.15);
            pointer-events: auto; /* Re-enable clicks on panels */
        }

        /* Giant Buttons for Fat Fingers */
        .huge-btn {
            background: linear-gradient(to bottom, #60a5fa, #3b82f6);
            box-shadow: 0 10px 0 0 #1e40af, 0 15px 20px rgba(0,0,0,0.2);
            color: white;
            transition: all 0.1s;
            pointer-events: auto;
        }
        .huge-btn:active {
            transform: translateY(10px);
            box-shadow: 0 0px 0 0 #1e40af, 0 5px 10px rgba(0,0,0,0.2);
        }

        .huge-btn-danger {
            background: linear-gradient(to bottom, #fde047, #f59e0b);
            box-shadow: 0 10px 0 0 #b45309, 0 15px 20px rgba(0,0,0,0.2);
            color: #78350f;
            transition: all 0.1s;
            pointer-events: auto;
        }
        .huge-btn-danger:active {
            transform: translateY(10px);
            box-shadow: 0 0px 0 0 #b45309, 0 5px 10px rgba(0,0,0,0.2);
        }

        /* Abu UI Elements */
        #abu-container {
            position: relative;
            transform-origin: center;
        }
        .abu-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .chat-bubble {
            position: relative;
            background: #ffffff;
            color: #1e3a8a;
            border-radius: 20px;
            padding: 12px 20px;
            font-weight: 800;
            box-shadow: 0 8px 20px rgba(30, 58, 138, 0.2);
            border: 3px solid #60a5fa;
            font-size: 1.1rem;
            line-height: 1.4;
        }
        .chat-bubble::after {
            content: ''; position: absolute; left: -10px; top: 50%;
            transform: translateY(-50%);
            border-width: 10px 10px 10px 0; border-style: solid; border-color: transparent #ffffff transparent transparent;
        }
        .chat-bubble::before {
            content: ''; position: absolute; left: -14px; top: 50%;
            transform: translateY(-50%);
            border-width: 12px 12px 12px 0; border-style: solid; border-color: transparent #60a5fa transparent transparent;
            z-index: -1;
        }

        /* Onboarding Hand Animation */
        #tutorial-hand {
            position: absolute;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        .anim-tap { animation: tapHand 2s infinite; opacity: 1 !important; }
        @keyframes tapHand {
            0% { transform: translate(0, 0) scale(1.2); }
            20% { transform: translate(-20px, 20px) scale(0.9); } /* Tap down */
            30% { transform: translate(-20px, 20px) scale(1); } /* Release */
            100% { transform: translate(0, 0) scale(1.2); }
        }

        /* Start Screen */
        #start-screen {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.9), rgba(56, 189, 248, 0.9));
        }
    </style>
</head>
<body>

    <!-- 3D Canvas Injection -->
    <div id="canvas-container"></div>

    <!-- UI Overlay Layer -->
    <div id="ui-layer" class="safe-area-inset-top safe-area-inset-bottom p-4 sm:p-6">
        
        <!-- Top HUD -->
        <div class="flex justify-between items-start">
            <!-- A-Bu Dialog Section -->
            <div class="flex items-center gap-3 w-[75%] sm:w-[50%] pointer-events-auto">
                <div id="abu-container" class="abu-float shrink-0 cursor-pointer" onclick="pokeAbu()">
                    <svg viewBox="0 0 100 100" width="70" height="70" class="filter drop-shadow-md">
                        <circle cx="50" cy="50" r="45" fill="#1e293b" />
                        <!-- Eyes -->
                        <circle cx="35" cy="40" r="8" fill="white" /><circle cx="36" cy="40" r="4" fill="black" id="abu-eye-l"/>
                        <circle cx="65" cy="40" r="8" fill="white" /><circle cx="64" cy="40" r="4" fill="black" id="abu-eye-r"/>
                        <!-- Beak -->
                        <path d="M 45 45 L 55 45 L 50 60 Z" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
                    </svg>
                </div>
                <div class="chat-bubble" id="dialog-text">
                    直接點擊亮亮的「發光網格」把積木疊上去吧！
                </div>
            </div>

            <!-- Level / Stars -->
            <div class="glass-panel rounded-2xl px-4 py-2 flex items-center justify-center pointer-events-auto">
                <div id="stars-display" class="text-2xl sm:text-3xl tracking-widest text-yellow-500 drop-shadow-sm">⚪⚪⚪⚪⚪</div>
            </div>
        </div>

        <!-- Middle (Empty, transparent for 3D view) -->
        <div class="flex-grow flex items-center justify-center relative">
            <!-- Tutorial Hand -->
            <svg id="tutorial-hand" width="60" height="60" viewBox="0 0 24 24" fill="#fbbf24" stroke="#b45309" stroke-width="1.5">
                <path d="M11 21v-8.5a1.5 1.5 0 0 1 3 0V14h.5a1.5 1.5 0 0 1 3 0V15h.5a1.5 1.5 0 0 1 3 0v2c0 3-2.5 5.5-5.5 5.5h-2c-3 0-5.5-2.5-5.5-5.5v-8.5a1.5 1.5 0 0 1 3 0V21" />
                <path d="M11 6.5a1.5 1.5 0 0 1 3 0V12" />
            </svg>
        </div>

        <!-- Bottom Controls -->
        <div class="flex w-full gap-4 pb-2">
            <button onclick="resetCurrentLevel()" class="huge-btn-danger text-2xl sm:text-3xl font-black rounded-3xl py-4 sm:py-6 flex-1 max-w-[120px]">
                清空 🧹
            </button>
            <button onclick="checkWinCondition()" class="huge-btn text-2xl sm:text-4xl font-black rounded-3xl py-4 sm:py-6 flex-[3]">
                我蓋好了！ ✅
            </button>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center text-center p-6 backdrop-blur-xl">
        <h1 class="text-5xl sm:text-7xl font-black text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)] mb-8 leading-tight">
            阿布 3D 魔術方塊<br><span class="text-3xl sm:text-4xl text-yellow-300">觸控進化版 🎮</span>
        </h1>
        <svg viewBox="0 0 100 100" width="120" height="120" class="mb-12 animate-bounce filter drop-shadow-[0_10px_10px_rgba(0,0,0,0.4)]">
            <rect x="25" y="25" width="50" height="50" rx="10" fill="#3b82f6" stroke="#fff" stroke-width="4"/>
            <rect x="35" y="35" width="30" height="30" rx="5" fill="#60a5fa" />
        </svg>
        <button onclick="startGame()" class="huge-btn text-3xl sm:text-5xl font-black py-6 px-16 rounded-full">
            進入 3D 世界！🚀
        </button>
    </div>

    <!-- Victory Screen -->
    <div id="victory-screen" class="hidden absolute inset-0 z-[60] flex flex-col items-center justify-center text-center bg-white/90 backdrop-blur-md p-6 pointer-events-auto">
        <div class="text-[100px] sm:text-[150px] mb-4 drop-shadow-2xl">🏆</div>
        <h2 class="text-5xl sm:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-indigo-600 mb-8 animate-pulse">
            太狂啦！3D 天才！
        </h2>
        <button onclick="nextLevel()" id="next-btn" class="huge-btn text-3xl font-black py-5 px-14 rounded-full">
            下一關 🔥
        </button>
    </div>

    <script>
        // --- Web Audio Synthesizer ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playSynth(type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'delete') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            }
        }

        // --- Speech ---
        let voiceSynthesizer = window.speechSynthesis;
        function speak(text) {
            voiceSynthesizer.cancel(); 
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 1.35;
            voiceSynthesizer.speak(msg);
            document.getElementById('dialog-text').innerText = text;
        }

        function pokeAbu() {
            const abu = document.getElementById('abu-container');
            gsap.to(abu, { rotation: 15, yoyo: true, repeat: 1, duration: 0.15 });
            speak(["哈哈好癢！", "專心疊積木啦～", "旋轉畫面可以看更清楚喔！", "我是 3D 大師阿布！"][Math.floor(Math.random()*4)]);
        }

        // --- 3D Engine Setup (Three.js) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // background handled by CSS
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 8); // Isometric-ish view

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // optimize
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // OrbitControls (Smooth drag to rotate)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // buttery smooth
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // don't go below ground
        controls.minDistance = 4;
        controls.maxDistance = 15;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- Materials ---
        const roundedBoxGeo = new THREE.BoxGeometry(0.98, 0.98, 0.98); // slightly smaller than 1 grid for gaps

        // Player Cube Material (Glossy Blue)
        const playerMat = new THREE.MeshStandardMaterial({
            color: 0x3b82f6,
            roughness: 0.2, // shiny
            metalness: 0.1
        });

        // Ghost (Target) Material (Hologram style)
        const ghostMat = new THREE.MeshStandardMaterial({
            color: 0x60a5fa,
            transparent: true,
            opacity: 0.35,
            depthWrite: false, // Prevents z-fighting issues with transparency
            emissive: 0x3b82f6,
            emissiveIntensity: 0.2
        });

        const errorMat = new THREE.MeshStandardMaterial({
            color: 0xef4444,
            emissive: 0xef4444,
            emissiveIntensity: 0.5
        });

        // --- Game State & Grid ---
        const GRID_SIZE = 3; // 3x3x3 logical max for this game
        let currentLevelIndex = 0;
        let playerBlocksGroup = new THREE.Group();
        let ghostBlocksGroup = new THREE.Group();
        scene.add(playerBlocksGroup);
        scene.add(ghostBlocksGroup);
        
        let targetPattern = []; // Array of {x, y, z}
        
        // Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        // Invisible Floor Plane for detecting "ground" clicks
        const planeGeo = new THREE.PlaneGeometry(10, 10);
        const planeMat = new THREE.MeshBasicMaterial({ visible: false });
        const groundPlane = new THREE.Mesh(planeGeo, planeMat);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.01;
        scene.add(groundPlane);

        // Visible glowing Grid
        const gridHelper = new THREE.GridHelper(3, 3, 0xffffff, 0xffffff);
        gridHelper.material.opacity = 0.5;
        gridHelper.material.transparent = true;
        // Shift grid so world origin is corner, not center. Wait, easier to keep origin at center of 3x3.
        // If 3x3 grid, size=3, divisions=3. Cell size = 1.
        gridHelper.position.set(0, 0.01, 0); 
        scene.add(gridHelper);

        // --- Levels ---
        // Coordinates: x (-1 to 1), y (0 to 2), z (-1 to 1)
        const levels = [
            [{x:0, y:0, z:0}], // 1 block
            [{x:-1, y:0, z:0}, {x:0, y:0, z:0}, {x:1, y:0, z:0}], // Row of 3
            [{x:0, y:0, z:0}, {x:0, y:1, z:0}], // Stack of 2
            [{x:-1, y:0, z:0}, {x:0, y:0, z:0}, {x:0, y:1, z:0}, {x:1, y:0, z:0}, {x:1, y:1, z:0}, {x:1, y:2, z:0}], // Staircase
            [{x:0, y:0, z:0}, {x:-1, y:0, z:0}, {x:1, y:0, z:0}, {x:0, y:0, z:-1}, {x:0, y:0, z:1}, {x:0, y:1, z:0}] // Cross + 1 top
        ];

        function startGame() {
            initAudio();
            speak('');
            document.getElementById('start-screen').style.display = 'none';
            
            // Show tutorial hand
            const hand = document.getElementById('tutorial-hand');
            hand.classList.add('anim-tap');
            // Position hand roughly in center of 3D canvas via CSS
            hand.style.left = '50%'; hand.style.top = '55%';
            
            loadLevel(currentLevelIndex);
            speak("直接點擊發光的格子，把積木疊上去！");
        }

        function loadLevel(index) {
            targetPattern = levels[index];
            updateStarsUI();
            
            // Clear existing
            resetCurrentLevel();
            ghostBlocksGroup.clear();

            // Build Ghosts
            targetPattern.forEach(pos => {
                const mesh = new THREE.Mesh(roundedBoxGeo, ghostMat);
                mesh.position.set(pos.x, pos.y + 0.5, pos.z); // y+0.5 because box origin is center
                ghostBlocksGroup.add(mesh);
            });

            // Reset Camera
            gsap.to(camera.position, { x: 5, y: 5, z: 8, duration: 1.5, ease: "power2.inOut" });
            controls.target.set(0, 0, 0);
        }

        function resetCurrentLevel() {
            playerBlocksGroup.clear();
            playSynth('delete');
        }

        // --- Interactions (Add / Remove Blocks) ---
        let isDraggingCam = false;
        let ptrDownX = 0, ptrDownY = 0;

        container.addEventListener('pointerdown', (e) => {
            ptrDownX = e.clientX; ptrDownY = e.clientY;
            isDraggingCam = false;
        });

        container.addEventListener('pointermove', (e) => {
            if (Math.abs(e.clientX - ptrDownX) > 5 || Math.abs(e.clientY - ptrDownY) > 5) {
                isDraggingCam = true; // Moved too much = orbiting, not clicking
            }
        });

        container.addEventListener('pointerup', (e) => {
            // Hide tutorial on first interaction
            document.getElementById('tutorial-hand').classList.remove('anim-tap');

            if (isDraggingCam) return; // Orbiting finished
            
            // Normalize mouse
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // 1. Did we click an existing player block?
            const playerIntersects = raycaster.intersectObjects(playerBlocksGroup.children);
            if (playerIntersects.length > 0) {
                const intersect = playerIntersects[0];
                const block = intersect.object;
                const normal = intersect.face.normal;

                // If tapped on TOP face -> ADD block on top
                // If tapped on SIDE faces -> ADD block on side
                // If tapped with LONG PRESS (handled by double tap or simple logic) -> For kids, tapping top adds. 
                // Let's implement ADD on face normal for standard Minecraft style.
                
                // For deleting: if child clicks SAME block twice fast? Or just add a "Delete Mode"?
                // Let's make it smarter: if max height reached or out of bounds (3x3), restrict.
                
                let newPos = block.position.clone().add(normal);
                
                // Bounds check (3x3 grid centered from -1 to 1)
                if (newPos.x >= -1.5 && newPos.x <= 1.5 && 
                    newPos.z >= -1.5 && newPos.z <= 1.5 && 
                    newPos.y < 3.5) { // max 3 height (0.5, 1.5, 2.5)
                    
                    // Snap to exact integer grids (-1, 0, 1) to avoid floating point drift
                    addPlayerBlock(Math.round(newPos.x), newPos.y - 0.5, Math.round(newPos.z));
                } else {
                    speak("這裡疊太出去囉！");
                }
                return;
            }

            // 2. Did we click the Ground/Grid?
            const groundIntersects = raycaster.intersectObject(groundPlane);
            if (groundIntersects.length > 0) {
                const p = groundIntersects[0].point;
                // Round point to nearest integer -1, 0, 1
                let gx = Math.round(p.x);
                let gz = Math.round(p.z);
                
                // Bounds check
                if (gx >= -1 && gx <= 1 && gz >= -1 && gz <= 1) {
                    // Check if column is empty at y=0
                    let colHasBlock = playerBlocksGroup.children.some(b => Math.round(b.position.x) === gx && Math.round(b.position.z) === gz && Math.round(b.position.y - 0.5) === 0);
                    
                    if (!colHasBlock) {
                        addPlayerBlock(gx, 0, gz);
                    }
                }
            }
        });

        function addPlayerBlock(x, y, z) {
            playSynth('pop');
            const mesh = new THREE.Mesh(roundedBoxGeo, playerMat);
            // Spawn slightly higher and drop in
            mesh.position.set(x, y + 1.5, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            // Store logical coords in userData for easy checking
            mesh.userData = { logicalX: x, logicalY: y, logicalZ: z };
            
            playerBlocksGroup.add(mesh);

            // Animate Drop & Bounce
            gsap.to(mesh.position, {
                y: y + 0.5, // final position
                duration: 0.4,
                ease: "bounce.out"
            });
            
            // Animate pop scale
            mesh.scale.set(0,0,0);
            gsap.to(mesh.scale, { x: 1, y: 1, z: 1, duration: 0.3, ease: "back.out(1.7)" });

            // Random positive chatter
            if(Math.random() > 0.6) {
                let msgs = ["好！", "再疊！", "沒錯！", "轉動看看對不對！"];
                document.getElementById('dialog-text').innerText = msgs[Math.floor(Math.random()*msgs.length)];
            }
        }

        // --- Logic Validation & Scaffolding ---
        function checkWinCondition() {
            // Restore all materials in case they were red
            playerBlocksGroup.children.forEach(b => b.material = playerMat);

            let playerLogical = playerBlocksGroup.children.map(b => `${b.userData.logicalX},${b.userData.logicalY},${b.userData.logicalZ}`);
            let targetLogical = targetPattern.map(p => `${p.x},${p.y},${p.z}`);

            // Sort logic to compare arrays easily
            playerLogical.sort();
            targetLogical.sort();

            let isWin = (playerLogical.length === targetLogical.length) && 
                        playerLogical.every((val, index) => val === targetLogical[index]);

            if (isWin) {
                handleVictory();
            } else {
                handleScaffoldingHint(playerLogical, targetLogical);
            }
        }

        function handleScaffoldingHint(playerLogical, targetLogical) {
            // Find extra blocks (in player but not in target)
            let wrongBlocksData = playerLogical.filter(x => !targetLogical.includes(x));
            
            if (wrongBlocksData.length > 0) {
                speak('哎呀！哪裡凸出來了？紅色的積木是多餘的喔！');
                
                // Highlight wrong blocks red
                playerBlocksGroup.children.forEach(b => {
                    let str = `${b.userData.logicalX},${b.userData.logicalY},${b.userData.logicalZ}`;
                    if (wrongBlocksData.includes(str)) {
                        b.material = errorMat;
                        // Animate pulse
                        gsap.to(b.scale, { x: 1.1, y: 1.1, z: 1.1, yoyo: true, repeat: 3, duration: 0.2 });
                        
                        // Smart Camera: look at the mistake
                        gsap.to(controls.target, {
                            x: b.position.x, y: b.position.y, z: b.position.z, duration: 1
                        });
                        // Allow tapping wrong block to delete it easily
                        b.userData.isMarkedWrong = true;
                    }
                });
            } else if (playerLogical.length < targetLogical.length) {
                speak('形狀對了，但是還不夠高喔！發光的影子還沒有填滿！');
                // Pulse the ghost blocks
                ghostBlocksGroup.children.forEach(g => {
                    gsap.to(g.material, { opacity: 0.8, yoyo: true, repeat: 5, duration: 0.3 });
                });
            } else {
                speak('轉轉視角！是不是哪裡排錯位置了呢？');
            }
        }

        // Allow deleting explicitly wrong blocks by tapping them
        container.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(playerBlocksGroup.children);
            if (intersects.length > 0) {
                const block = intersects[0].object;
                if (block.userData.isMarkedWrong) {
                    playerBlocksGroup.remove(block);
                    playSynth('delete');
                    speak('去掉了！繼續挑戰！');
                }
            }
        });

        function handleVictory() {
            // Make ghosts invisible
            ghostBlocksGroup.clear();
            
            // Mega spin animation
            gsap.to(playerBlocksGroup.rotation, {
                y: Math.PI * 2, duration: 2, ease: "power2.inOut"
            });
            
            speak('太強啦！澔澔蓋得跟影子一模一樣！你是 3D 小天才！');
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });

            setTimeout(() => {
                document.getElementById('victory-screen').classList.remove('hidden');
                playerBlocksGroup.rotation.y = 0; // reset
            }, 2500);
        }

        function nextLevel() {
            document.getElementById('victory-screen').classList.add('hidden');
            currentLevelIndex++;
            if (currentLevelIndex >= levels.length) {
                speak('哇！澔澔破關了所有的魔法挑戰！宇宙最強！');
                currentLevelIndex = 0; // Loop back for now
            }
            loadLevel(currentLevelIndex);
        }

        function updateStarsUI() {
            let s = '';
            for(let i=0; i<levels.length; i++) {
                s += i < currentLevelIndex ? '⭐' : (i === currentLevelIndex ? '🌟' : '⚪');
            }
            document.getElementById('stars-display').innerText = s;
        }

        // --- Render Loop ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // only required if controls.enableDamping or controls.autoRotate are set
            
            // Slowly rotate ghost blocks to make them look holographic
            ghostBlocksGroup.children.forEach(g => {
                g.material.emissiveIntensity = 0.2 + Math.sin(Date.now() * 0.005) * 0.1;
            });

            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
