<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>阿布超市小星探 🚀 (真實物理版)</title>
    
    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Matter.js Physics Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <!-- Confetti & Animations -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+TC:wght@700;900&display=swap');
        
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background: linear-gradient(180deg, #f0fdf4 0%, #dcfce7 100%);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        #ui-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom) 1.5rem;
        }

        /* Glassmorphism Components */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(22, 101, 52, 0.1);
            pointer-events: auto;
        }

        /* Bouncy Buttons */
        .btn-green {
            background: linear-gradient(to bottom, #4ade80, #22c55e);
            box-shadow: 0 8px 0 0 #166534, 0 12px 20px rgba(0,0,0,0.15);
            color: white;
            transition: all 0.1s;
            pointer-events: auto;
        }
        .btn-green:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 0 #166534, 0 4px 10px rgba(0,0,0,0.1);
        }

        .num-btn {
            background: white;
            border: 3px solid #bbf7d0;
            color: #166534;
            font-weight: 900;
            font-size: 2rem;
            transition: all 0.1s;
            pointer-events: auto;
            box-shadow: 0 6px 0 0 #dcfce7;
        }
        .num-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 0 #dcfce7;
            background: #f0fdf4;
        }

        /* Abu Chat Bubble */
        .chat-bubble {
            position: relative;
            background: white;
            border: 4px solid #4ade80;
            border-radius: 24px;
            padding: 12px 20px;
            font-weight: 800;
            font-size: 1.1rem;
            color: #064e3b;
            box-shadow: 0 6px 15px rgba(22, 101, 52, 0.15);
        }
        .chat-bubble::after {
            content: ''; position: absolute; left: -14px; top: 50%;
            transform: translateY(-50%);
            border-width: 10px 14px 10px 0; border-style: solid; border-color: transparent #4ade80 transparent transparent;
        }

        /* Animations */
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #start-screen {
            background: radial-gradient(circle at center, #86efac, #22c55e);
        }

        /* Numpad appearance */
        #numpad-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 15px;
            border-radius: 30px;
        }
    </style>
</head>
<body>

    <!-- Matter.js Viewport -->
    <div id="game-canvas"></div>

    <!-- UI Overlay Layer -->
    <div id="ui-overlay">
        
        <!-- Header: A-Bu Dialogue & Level -->
        <div class="flex justify-between items-start mt-4">
            <div class="flex items-center gap-4 w-[80%] pointer-events-auto">
                <div class="floating shrink-0 cursor-pointer" onclick="pokeAbu()">
                    <svg width="80" height="80" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="#333" />
                        <!-- Eyes -->
                        <circle cx="35" cy="40" r="8" fill="white" /><circle cx="36" cy="40" r="4" fill="black" />
                        <circle cx="65" cy="40" r="8" fill="white" /><circle cx="64" cy="40" r="4" fill="black" />
                        <!-- Beak -->
                        <path d="M 45 45 L 55 45 L 50 60 Z" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
                        <!-- Headband -->
                        <rect x="25" y="65" width="50" height="15" fill="#ef4444" rx="3" />
                    </svg>
                </div>
                <div class="chat-bubble" id="abu-dialog">
                    澔澔，幫我把輸送帶上的東西放進籃子裡吧！
                </div>
            </div>
            <div class="glass-card rounded-2xl px-5 py-2 pointer-events-auto">
                <div id="stars-track" class="text-2xl sm:text-3xl tracking-tighter text-yellow-500">⚪⚪⚪⚪⚪</div>
            </div>
        </div>

        <!-- Middle: Checkout Counter (Visualized by Matter.js) -->
        <div class="flex-grow flex flex-col justify-center items-center">
            <!-- Hints can appear here -->
        </div>

        <!-- Bottom: User Input Panel -->
        <div class="mb-4 flex flex-col items-center">
            <div id="numpad-container" class="glass-card hidden w-full max-w-[500px]">
                <!-- Generated buttons -->
            </div>
            <div class="mt-4 pointer-events-auto">
                <button id="checkout-btn" class="btn-green text-3xl font-black px-12 py-5 rounded-full hidden" onclick="checkTotal()">
                    數好了！點我看答案 🧐
                </button>
            </div>
        </div>
    </div>

    <!-- Start Overlay -->
    <div id="start-screen" class="absolute inset-0 z-[100] flex flex-col items-center justify-center text-center p-8">
        <h1 class="text-6xl sm:text-8xl font-black text-white drop-shadow-2xl mb-4">阿布超市</h1>
        <p class="text-2xl sm:text-3xl text-green-100 font-bold mb-12">澔澔專屬小星探 🛒✨</p>
        
        <div class="relative mb-16 transform scale-150">
            <svg width="120" height="120" viewBox="0 0 100 100" class="filter drop-shadow-xl">
                <circle cx="50" cy="50" r="45" fill="#333" />
                <path d="M 45 45 L 55 45 L 50 60 Z" fill="#fbbf24" />
                <rect x="25" y="70" width="50" height="20" fill="#22c55e" rx="4" stroke="white" stroke-width="2" />
            </svg>
        </div>

        <button onclick="initGame()" class="btn-green text-4xl font-black px-16 py-8 rounded-full">
            進去買東西囉！🚀
        </button>
    </div>

    <!-- Victory Pop-up -->
    <div id="victory-screen" class="hidden absolute inset-0 z-[200] flex items-center justify-center bg-white/90 backdrop-blur-md p-6">
        <div class="flex flex-col items-center">
            <div class="text-[120px] mb-4">🍎🍌🥛</div>
            <h2 id="victory-title" class="text-5xl sm:text-7xl font-black text-green-700 mb-8 animate-bounce">澔澔太聰明了！</h2>
            <button onclick="nextLevel()" class="btn-green text-3xl font-black px-16 py-6 rounded-full">
                繼續下一關 🔥
            </button>
        </div>
    </div>

    <script>
        // --- Web Audio Generator ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audio;
        function setupAudio() {
            if (!audio) audio = new AudioCtx();
            if (audio.state === 'suspended') audio.resume();
        }
        function playChime(freq = 880, dur = 0.1) {
            if (!audio) return;
            const osc = audio.createOscillator();
            const gain = audio.createGain();
            osc.connect(gain);
            gain.connect(audio.destination);
            osc.frequency.setValueAtTime(freq, audio.currentTime);
            gain.gain.setValueAtTime(0, audio.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, audio.currentTime + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + dur);
            osc.start(); osc.stop(audio.currentTime + dur);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 1.3;
            window.speechSynthesis.speak(msg);
            document.getElementById('abu-dialog').innerText = text;
        }

        function pokeAbu() {
            speak(["澔澔，這些水果看起來好好吃！", "幫我數數看我們要買幾個？", "我不小心跌倒了，快來幫我！", "加油澔澔，你是數數天才！"][Math.floor(Math.random()*4)]);
        }

        // --- Matter.js Setup ---
        const { Engine, Render, Runner, World, Bodies, Composite, MouseConstraint, Mouse, Events } = Matter;
        let engine, runner, render;
        let itemsInCart = 0;
        let targetCount = 0;
        let currentLevel = 1;
        const totalLevels = 5;

        const W = window.innerWidth;
        const H = window.innerHeight;

        function initGame() {
            document.getElementById('start-screen').style.display = 'none';
            setupAudio();
            
            engine = Engine.create();
            render = Render.create({
                element: document.getElementById('game-canvas'),
                engine: engine,
                options: {
                    width: W,
                    height: H,
                    wireframes: false,
                    background: 'transparent'
                }
            });

            // Boundaries
            const ground = Bodies.rectangle(W/2, H + 50, W, 100, { isStatic: true });
            const leftWall = Bodies.rectangle(-50, H/2, 100, H, { isStatic: true });
            const rightWall = Bodies.rectangle(W + 50, H/2, 100, H, { isStatic: true });
            
            // The Shopping Cart (V-Shape or U-Shape)
            const cartBottom = Bodies.rectangle(W*0.7, H*0.75, 250, 20, { 
                isStatic: true, render: { fillStyle: '#166534' }, label: 'cart' 
            });
            const cartLeft = Bodies.rectangle(W*0.7 - 120, H*0.65, 20, 150, { 
                isStatic: true, render: { fillStyle: '#22c55e' }, angle: -0.2, label: 'cart'
            });
            const cartRight = Bodies.rectangle(W*0.7 + 120, H*0.65, 20, 150, { 
                isStatic: true, render: { fillStyle: '#22c55e' }, angle: 0.2, label: 'cart'
            });

            // Add conveyor belt area (Visual only)
            const conveyor = Bodies.rectangle(W*0.25, H*0.6, W*0.4, 40, { 
                isStatic: true, render: { fillStyle: '#334155' }, label: 'conveyor'
            });

            World.add(engine.world, [ground, leftWall, rightWall, cartBottom, cartLeft, cartRight, conveyor]);

            // Add Mouse Control
            const mouse = Mouse.create(render.canvas);
            const mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: { stiffness: 0.2, render: { visible: false } }
            });
            World.add(engine.world, mouseConstraint);

            // Item Detection logic
            Events.on(engine, 'collisionStart', (event) => {
                event.pairs.forEach(pair => {
                    const { bodyA, bodyB } = pair;
                    // If an item touches the cart bottom
                    if ((bodyA.label === 'item' && bodyB.label === 'cart') || 
                        (bodyB.label === 'item' && bodyA.label === 'cart')) {
                        const item = bodyA.label === 'item' ? bodyA : bodyB;
                        if (!item.isCounted) {
                            item.isCounted = true;
                            itemsInCart++;
                            playChime(440 + itemsInCart * 110, 0.2);
                            checkPhaseProgress();
                        }
                    }
                });
            });

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            loadLevel(currentLevel);
        }

        const itemIcons = ['🍎', '🍌', '🥛', '🍪', '🍊', '🥦'];

        function loadLevel(level) {
            itemsInCart = 0;
            targetCount = 3 + level; // DDA: Increases per level
            updateStarsUI();
            
            // Clear items
            Composite.allBodies(engine.world)
                .filter(b => b.label === 'item')
                .forEach(b => World.remove(engine.world, b));

            // Spawn items on the conveyor belt
            for (let i = 0; i < targetCount; i++) {
                setTimeout(() => {
                    spawnItem(W*0.1 + (i*40), H*0.4);
                }, i * 300);
            }

            document.getElementById('numpad-container').style.display = 'none';
            document.getElementById('checkout-btn').style.display = 'none';
            speak(`澔澔，幫阿布數數看，把這 ${targetCount} 個好吃的東西通通放進籃子裡！`);
        }

        function spawnItem(x, y) {
            const icon = itemIcons[Math.floor(Math.random() * itemIcons.length)];
            const size = 50;
            const item = Bodies.circle(x, y, size/2, {
                restitution: 0.6,
                friction: 0.1,
                label: 'item',
                render: {
                    sprite: {
                        // Creating a canvas texture for emojis (Better cross-platform)
                        texture: createEmojiTexture(icon, size)
                    }
                }
            });
            item.isCounted = false;
            World.add(engine.world, item);
        }

        function createEmojiTexture(emoji, size) {
            const canvas = document.createElement('canvas');
            canvas.width = size * 2; canvas.height = size * 2;
            const ctx = canvas.getContext('2d');
            ctx.font = `${size}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, size, size);
            return canvas.toDataURL();
        }

        function checkPhaseProgress() {
            if (itemsInCart === targetCount) {
                setTimeout(() => {
                    speak("放好了！籃子裡面一共有幾個呢？點點看數字！");
                    showNumpad();
                }, 1000);
            }
        }

        function showNumpad() {
            const container = document.getElementById('numpad-container');
            container.innerHTML = '';
            container.style.display = 'grid';
            
            // Generate numbers 1-20
            const max = Math.max(10, targetCount + 2);
            for (let i = 1; i <= max; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = 'num-btn rounded-2xl p-4';
                btn.onclick = () => submitAnswer(i);
                container.appendChild(btn);
            }
            gsap.from(container, { y: 100, opacity: 0, duration: 0.5, ease: "back.out" });
        }

        function submitAnswer(val) {
            if (val === targetCount) {
                handleVictory();
            } else {
                playChime(220, 0.4);
                speak("差一點點喔！我們再數一次籃子裡的寶貝！");
                // Shake the UI cart info?
            }
        }

        function handleVictory() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            playChime(1100, 0.5);
            speak("答對了！澔澔真是阿布的算數英雄！🌟");
            
            setTimeout(() => {
                document.getElementById('victory-screen').classList.remove('hidden');
            }, 1000);
        }

        function nextLevel() {
            document.getElementById('victory-screen').classList.add('hidden');
            currentLevel++;
            if (currentLevel > totalLevels) {
                speak("哇！澔澔幫阿布把超市的東西都數完了，你是全宇宙最強的小星探！🏆");
                currentLevel = 1;
            }
            loadLevel(currentLevel);
        }

        function updateStarsUI() {
            let s = '';
            for(let i=0; i<totalLevels; i++) {
                s += i < currentLevel - 1 ? '⭐' : (i === currentLevel - 1 ? '🌟' : '⚪');
            }
            document.getElementById('stars-track').innerText = s;
        }

        // Handle Resizing
        window.addEventListener('resize', () => {
            location.reload(); // Matter.js layouts are hard to reflow dynamically without full reset
        });

    </script>
</body>
</html>
